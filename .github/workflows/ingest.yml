name: ingest

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      ids:
        description: "Space-separated extension ids to ingest (empty = all)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Pushes commits straight to main, which requires the "validate"
          # status check. That check only runs on pull_request, so a push
          # authenticated with the default GITHUB_TOKEN is always rejected
          # (GH006). ADMIN_PAT belongs to a repo admin, which is exempt from
          # required status checks (enforce_admins is off), so it can push
          # directly.
          token: ${{ secrets.ADMIN_PAT }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Ingest new releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/ingest.js ${{ inputs.ids }}
      - name: Commit version records
        run: |
          git config user.name "silo-registry-bot"
          git config user.email "registry-bot@getsilo.dev"
          git add versions readmes
          if ! git diff --cached --quiet; then
            git commit -m "ingest: $(git diff --cached --name-only | grep -c versions/) record(s) updated"
            git push
          fi
